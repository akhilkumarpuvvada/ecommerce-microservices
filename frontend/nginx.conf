server {
    listen 80;

    # Serve React static files
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;   # SPA fallback
    }

    # Proxy /orders and /inventory to the API Gateway
    # The React app calls /orders (no host) — nginx forwards to gateway
    location /orders {
        proxy_pass http://api-gateway:3000;
        proxy_set_header Host $host;
    }

    location /inventory {
        proxy_pass http://api-gateway:3000;
        proxy_set_header Host $host;
    }
}
